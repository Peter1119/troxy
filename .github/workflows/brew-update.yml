name: Update Homebrew formula

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  update-formula:
    name: Bump formula in homebrew-troxy tap
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Checkout homebrew-troxy tap
        uses: actions/checkout@v4
        with:
          repository: Peter1119/homebrew-troxy
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FORMULA="tap/Formula/troxy.rb"

          # Formula uses git URL + tag — only the tag value changes per release.
          sed -i "s|tag: \"v[0-9][^\"]*\"|tag: \"v$VERSION\"|" "$FORMULA"

          echo "Updated $FORMULA to v$VERSION"
          cat "$FORMULA"

      - name: Commit and push formula update
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd tap
          git config user.name "peter1119"
          git config user.email "peter1119@users.noreply.github.com"
          git add Formula/troxy.rb
          git diff --staged --quiet && echo "No changes — formula already up to date." && exit 0
          git commit -m "chore: bump troxy to v${VERSION}"
          git push
